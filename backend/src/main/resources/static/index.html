<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>摩记控制台</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    :root {
      --bg: #060b14;
      --bg-soft: #0a1220;
      --panel: rgba(16, 25, 39, 0.96);
      --panel-2: rgba(19, 34, 53, 0.97);
      --stroke: rgba(78, 116, 151, 0.72);
      --stroke-soft: rgba(78, 116, 151, 0.34);
      --line: #36d0ff;
      --line-soft: #67f2d7;
      --warn: #ff9b3d;
      --warn-soft: #ffc65a;
      --danger: #ff6b6b;
      --text: #edf4ff;
      --muted: #8ea4bf;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --touch: 46px;
      --nav-height: 82px;
    }

    * { box-sizing: border-box; }
    html { font-size: 16px; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(54, 208, 255, 0.10), transparent 30%),
        radial-gradient(circle at top right, rgba(255, 155, 61, 0.10), transparent 32%),
        linear-gradient(180deg, #07101b 0%, #02060c 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at center, #000, transparent 86%);
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(115deg, transparent 0 36%, rgba(54, 208, 255, 0.06) 36% 37%, transparent 37% 100%),
        linear-gradient(115deg, transparent 0 58%, rgba(255, 155, 61, 0.05) 58% 59%, transparent 59% 100%);
      pointer-events: none;
    }

    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }

    #app {
      max-width: 1080px;
      margin: 0 auto;
      padding: 20px 16px calc(var(--nav-height) + 36px);
      position: relative;
    }

    .screen,
    .page-shell,
    .dashboard-shell,
    .record-stack,
    .metric-grid,
    .dual-list,
    .auth-form,
    .toolbar-panel,
    .profile-panel,
    .modal-form {
      display: grid;
      gap: 14px;
    }

    .auth-shell {
      min-height: calc(100vh - 120px);
      display: grid;
      place-items: center;
      position: relative;
    }

    .hud-grid {
      position: absolute;
      inset: 0;
      border-radius: 32px;
      background:
        radial-gradient(circle at center, rgba(54, 208, 255, 0.10), transparent 44%),
        linear-gradient(135deg, rgba(255,255,255,0.02), transparent);
      filter: blur(1px);
    }

    .auth-card,
    .hero-panel,
    .vehicle-panel,
    .empty-panel,
    .metric-card,
    .chart-panel,
    .toolbar-panel,
    .record-card,
    .garage-card,
    .mini-panel,
    .quick-note,
    .profile-panel,
    .modal-sheet {
      position: relative;
      background: linear-gradient(180deg, var(--panel), rgba(8, 14, 23, 0.98));
      border: 1px solid var(--stroke);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .auth-card::before,
    .hero-panel::before,
    .vehicle-panel::before,
    .empty-panel::before,
    .metric-card::before,
    .chart-panel::before,
    .toolbar-panel::before,
    .record-card::before,
    .garage-card::before,
    .mini-panel::before,
    .quick-note::before,
    .profile-panel::before,
    .modal-sheet::before {
      content: "";
      position: absolute;
      inset: 0;
        background:
          linear-gradient(135deg, rgba(54, 208, 255, 0.08), transparent 40%),
          linear-gradient(315deg, rgba(255, 155, 61, 0.06), transparent 36%);
        pointer-events: none;
      }

      .metric-card::after,
      .chart-panel::after,
      .record-card::after,
      .garage-card::after,
      .mini-panel::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(110deg, transparent 0 42%, rgba(54, 208, 255, 0.08) 48%, transparent 54%);
        transform: translateX(-120%);
        animation: panelSweep 8s linear infinite;
        pointer-events: none;
      }

    .auth-card,
    .hero-panel,
    .vehicle-panel,
    .empty-panel,
    .chart-panel,
    .toolbar-panel,
    .record-card,
    .garage-card,
    .mini-panel,
    .quick-note,
    .profile-panel,
    .modal-sheet {
      padding: 18px;
    }

    .hero-panel.compact { padding: 16px 18px; }
    .hero-panel.orange { border-color: rgba(255, 155, 61, 0.72); }
    .hero-panel.yellow { border-color: rgba(255, 198, 90, 0.72); }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid currentColor;
      background: rgba(17, 31, 46, 0.86);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      width: fit-content;
    }

    .accent-cyan { color: var(--line); }
    .accent-mint { color: var(--line-soft); }
    .accent-orange { color: var(--warn); }
    .accent-yellow { color: var(--warn-soft); }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(28px, 6vw, 42px); line-height: 1; margin-top: 12px; }
    .hero-panel p,
    .auth-copy,
    .toolbar-panel p,
    .quick-note p,
    .record-card p,
    .empty-panel p,
    .confirm-copy p {
      color: var(--muted);
      line-height: 1.65;
      font-size: 13px;
    }

    .action-panel {
      display: grid;
      gap: 18px;
    }

    .account-heading {
      align-items: flex-start;
      padding: 14px 16px;
      border: 1px solid rgba(54, 208, 255, 0.2);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(54, 208, 255, 0.08), transparent 40%),
        linear-gradient(180deg, rgba(14, 29, 45, 0.96), rgba(10, 18, 28, 0.9));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02), 0 12px 22px rgba(0, 0, 0, 0.16);
    }

    .section-kicker {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(54, 208, 255, 0.44);
      color: var(--line);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.3px;
      background: rgba(10, 23, 36, 0.88);
      box-shadow: 0 0 0 1px rgba(54, 208, 255, 0.08), inset 0 0 18px rgba(54, 208, 255, 0.08);
    }

    .account-heading strong {
      display: block;
      font-size: 18px;
      margin-top: 4px;
    }

    .account-heading p {
      margin: 4px 0 0;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      align-items: stretch;
    }

    .action-grid .btn {
      width: 100%;
      min-height: 54px;
      font-weight: 700;
      letter-spacing: 0.5px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
      position: relative;
      overflow: hidden;
    }

    .action-grid .action-main {
      box-shadow: 0 14px 26px rgba(54, 208, 255, 0.26);
    }

    .action-grid .action-secondary {
      border-color: rgba(54, 208, 255, 0.42);
      color: var(--line);
      background: linear-gradient(180deg, rgba(21, 37, 56, 0.96), rgba(11, 21, 33, 0.96));
    }

    .action-grid .action-quiet {
      min-height: 48px;
      border-color: rgba(255, 107, 107, 0.32);
      color: rgba(255, 125, 125, 0.82);
      background: linear-gradient(180deg, rgba(24, 22, 31, 0.92), rgba(16, 14, 22, 0.96));
      box-shadow: none;
      opacity: 0.9;
    }

    .action-grid .btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0 42%, rgba(255,255,255,0.16) 50%, transparent 58%);
      transform: translateX(-130%);
      transition: transform 0.4s ease;
      pointer-events: none;
    }

    .action-grid .btn:hover::after {
      transform: translateX(120%);
    }

    .action-grid .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 28px rgba(0, 0, 0, 0.2);
    }

    .action-grid .action-quiet:hover {
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.14);
      border-color: rgba(255, 107, 107, 0.48);
      color: rgba(255, 138, 138, 0.94);
    }

    .action-grid .btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.16);
    }

    .panel-footnote {
      margin: 0;
    }

    .vehicle-panel,
    .record-head,
    .toolbar-row,
    .section-heading,
    .profile-row,
    .mini-row,
    .modal-head,
    .record-actions,
    .vehicle-meta,
    .modal-actions,
    .auth-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .vehicle-panel strong,
    .record-head strong,
    .garage-card strong {
      font-size: 18px;
      font-weight: 700;
    }

    .record-head {
      align-items: flex-start;
    }

    .vehicle-panel span,
    .record-head span,
    .current-default,
    .section-heading span,
    .profile-row span,
    .mini-row span,
    .record-grid span {
      color: var(--muted);
      font-size: 12px;
    }

    .metric-grid,
    .record-grid,
    .dual-list,
    .preset-grid,
    .quick-menu {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .record-stack {
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      align-items: start;
    }

    .metric-card {
      padding: 16px;
      border-radius: 20px;
      min-height: 118px;
    }

    .metric-card h2 {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .metric-value {
      font-size: clamp(26px, 5vw, 42px);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
      text-shadow: 0 0 18px rgba(255,255,255,0.08);
      transition: text-shadow 0.22s ease, transform 0.22s ease;
    }

    .metric-sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }

    .hero-copy {
      max-width: 720px;
    }

    .tone-cyan { border-color: rgba(54, 208, 255, 0.75); }
    .tone-orange { border-color: rgba(255, 155, 61, 0.75); }
    .tone-mint { border-color: rgba(103, 242, 215, 0.75); }
    .tone-yellow { border-color: rgba(255, 198, 90, 0.75); }
    .tone-cyan .metric-value { text-shadow: 0 0 24px rgba(54, 208, 255, 0.24); }
    .tone-orange .metric-value { text-shadow: 0 0 24px rgba(255, 155, 61, 0.24); }
    .tone-mint .metric-value { text-shadow: 0 0 24px rgba(103, 242, 215, 0.24); }
    .tone-yellow .metric-value { text-shadow: 0 0 24px rgba(255, 198, 90, 0.24); }

    .trend-chart {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(48px, 1fr));
      align-items: end;
      gap: 10px;
      min-height: 190px;
      margin-top: 14px;
    }

    .trend-col {
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .trend-bar {
      width: 100%;
      max-width: 36px;
      border-radius: 14px 14px 8px 8px;
      background: linear-gradient(180deg, rgba(54, 208, 255, 0.95), rgba(103, 242, 215, 0.78));
      box-shadow: 0 0 18px rgba(54, 208, 255, 0.18);
    }

    .trend-col strong {
      font-size: 12px;
    }

    .trend-col span {
      color: var(--muted);
      font-size: 11px;
    }

    .alert-warn {
      border-color: rgba(255, 198, 90, 0.72);
    }

    .alert-danger {
      border-color: rgba(255, 107, 107, 0.72);
    }

    .alert-info {
      border-color: rgba(54, 208, 255, 0.62);
    }

    .status-toggle {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .status-option {
      min-height: var(--touch);
      border-radius: var(--radius-sm);
      border: 1px solid var(--stroke-soft);
      background: rgba(8, 14, 23, 0.96);
      color: var(--muted);
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, color 0.18s ease, background 0.18s ease;
    }

    .status-option.active {
      color: var(--text);
      border-color: rgba(54, 208, 255, 0.75);
      background: rgba(16, 35, 54, 0.98);
      box-shadow: inset 0 0 0 1px rgba(54, 208, 255, 0.2);
    }

    .service-meter {
      display: grid;
      gap: 8px;
      margin: 6px 0 8px;
    }

    .service-meter__value {
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .service-meter__label {
      color: var(--muted);
      font-size: 12px;
    }

    .service-meter__track {
      position: relative;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .service-meter__bar {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(54, 208, 255, 0.95), rgba(103, 242, 215, 0.95));
      animation: servicePulse 1.8s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(54, 208, 255, 0.28);
    }

    .alert-warn .service-meter__bar {
      background: linear-gradient(90deg, rgba(255, 198, 90, 0.95), rgba(255, 155, 61, 0.95));
      box-shadow: 0 0 20px rgba(255, 198, 90, 0.22);
    }

    .alert-danger .service-meter__bar {
      background: linear-gradient(90deg, rgba(255, 107, 107, 0.96), rgba(255, 155, 61, 0.92));
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.22);
    }

    @keyframes servicePulse {
      0% { transform: scaleX(0.98); opacity: 0.88; }
      50% { transform: scaleX(1); opacity: 1; }
      100% { transform: scaleX(0.98); opacity: 0.88; }
    }

    @keyframes panelSweep {
      0% { transform: translateX(-120%); opacity: 0; }
      8% { opacity: 1; }
      18% { transform: translateX(120%); opacity: 0; }
      100% { transform: translateX(120%); opacity: 0; }
    }

    @keyframes fabPulse {
      0% { box-shadow: 0 14px 30px rgba(0,0,0,0.34), 0 0 0 0 rgba(54, 208, 255, 0.22); }
      50% { box-shadow: 0 18px 34px rgba(0,0,0,0.38), 0 0 0 10px rgba(54, 208, 255, 0); }
      100% { box-shadow: 0 14px 30px rgba(0,0,0,0.34), 0 0 0 0 rgba(54, 208, 255, 0); }
    }

    @keyframes primarySweep {
      0% { transform: translateX(-120%); opacity: 0; }
      10% { opacity: 1; }
      24% { transform: translateX(120%); opacity: 0; }
      100% { transform: translateX(120%); opacity: 0; }
    }

    .metric-card strong {
      display: block;
      font-size: 26px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .metric-card small {
      display: block;
      color: var(--muted);
      line-height: 1.5;
      font-size: 11px;
    }

    .metric-card::after {
      content: "";
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 48px;
      height: 4px;
      border-radius: 999px;
      background: currentColor;
    }

    .metric-card.accent-cyan { color: var(--line); }
    .metric-card.accent-orange { color: var(--warn); }
    .metric-card.accent-mint { color: var(--line-soft); }
    .metric-card.accent-yellow { color: var(--warn-soft); }
    .metric-card strong,
    .record-grid strong,
    .profile-row strong,
    .mini-row strong { color: var(--text); }

    .trend-bars {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      min-height: 132px;
      padding-top: 10px;
    }

    .trend-item {
      flex: 1;
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .trend-item span { color: var(--muted); font-size: 11px; }
    .trend-bar {
      width: 100%;
      max-width: 28px;
      border-radius: 12px 12px 4px 4px;
      background: var(--line);
    }
    .trend-bar.orange { background: var(--warn); }
    .trend-bar.cyan { background: var(--line); }

    .record-stack { gap: 16px; }
    .record-card,
    .garage-card { border-radius: 20px; }
    .record-card p,
    .garage-card p { font-size: 12px; margin-top: 4px; }
    .record-grid { display: grid; gap: 10px; }
    .record-grid strong { font-size: 13px; font-weight: 700; }
    .garage-card.default { border-color: rgba(103, 242, 215, 0.78); }
    .record-card,
    .garage-card,
    .metric-card,
    .chart-panel,
    .mini-panel {
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
    }

    .record-card:hover,
    .garage-card:hover,
    .metric-card:hover,
    .chart-panel:hover,
    .mini-panel:hover {
      transform: translateY(-3px);
      border-color: rgba(54, 208, 255, 0.78);
      box-shadow: 0 22px 44px rgba(0, 0, 0, 0.34), 0 0 0 1px rgba(54, 208, 255, 0.08);
    }

    .record-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(84px, 1fr));
      width: 100%;
      gap: 8px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(78, 116, 151, 0.28);
    }

    .record-actions .btn {
      width: 100%;
      justify-content: center;
    }

    .btn,
    .quick-menu-btn,
    .preset-btn,
    .close-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: var(--touch);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      background: rgba(19, 34, 53, 0.94);
      color: var(--text);
      cursor: pointer;
      padding: 0 16px;
      text-align: center;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .btn:hover,
    .quick-menu-btn:hover,
    .preset-btn:hover,
    .close-btn:hover { transform: translateY(-1px); }

    .btn-primary,
    .quick-menu-btn.primary { background: var(--line); color: #061019; border-color: transparent; }
    .btn-primary.warn { background: var(--warn); }
    .btn-secondary,
    .quick-menu-btn { color: var(--line); }
    .btn-secondary.warn,
    .quick-menu-btn.warn { color: var(--warn); }
    .quick-menu-btn.mint { color: var(--line-soft); }
    .btn-danger { color: var(--danger); border-color: rgba(255, 107, 107, 0.55); }
    .btn-outline { color: var(--line-soft); border-color: rgba(103, 242, 215, 0.55); }
    .btn-small { min-height: 38px; padding: 0 12px; font-size: 12px; }
    .btn-inline { display: inline-flex; align-items: center; justify-content: center; width: fit-content; }

    .modal-actions .btn-primary {
      display: inline-flex;
      align-items: center;
      width: min(220px, 100%);
      margin: 0 auto;
      justify-self: center;
      justify-content: center;
      font-weight: 700;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.18);
      box-shadow: 0 12px 22px rgba(54, 208, 255, 0.24);
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .modal-actions .btn-primary::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0 42%, rgba(255,255,255,0.28) 50%, transparent 58%);
      transform: translateX(-120%);
      animation: primarySweep 3.2s linear infinite;
      pointer-events: none;
    }

    .modal-actions .btn-primary:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 16px 28px rgba(54, 208, 255, 0.3);
      filter: saturate(1.05);
    }

    .modal-actions .btn-primary:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 8px 16px rgba(54, 208, 255, 0.2);
    }

    .modal-actions {
      justify-content: center;
    }

    .field { display: grid; gap: 8px; }
    .field span { color: var(--muted); font-size: 12px; }
    .field input,
    .field select,
    .field textarea,
    .toolbar-row select {
      width: 100%;
      min-height: var(--touch);
      border-radius: var(--radius-sm);
      border: 1px solid var(--stroke-soft);
      background: rgba(8, 14, 23, 0.96);
      color: var(--text);
      padding: 0 14px;
      outline: none;
    }

    .field textarea { min-height: 92px; padding: 12px 14px; resize: vertical; }
    .field input:focus,
    .field select:focus,
    .field textarea:focus,
    .toolbar-row select:focus { border-color: var(--line); }
    .inline-field { align-items: center; }
    .switch-line { display: inline-flex; align-items: center; gap: 8px; color: var(--text); }

    .date-input {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 56px;
      gap: 0;
      align-items: center;
      border: 1px solid rgba(54, 208, 255, 0.22);
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: linear-gradient(90deg, rgba(16, 35, 54, 0.82), rgba(10, 19, 30, 0.96));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .date-input input {
      border: 0;
      border-right: 1px solid rgba(54, 208, 255, 0.18);
      border-radius: 0;
      background: transparent;
      min-width: 0;
    }

    .date-trigger {
      min-height: calc(var(--touch) + 2px);
      padding: 0;
      border-radius: 0;
      border: 0;
      background: radial-gradient(circle at center, rgba(54, 208, 255, 0.18), transparent 70%), rgba(11, 24, 37, 0.98);
      color: var(--line);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .date-trigger:hover {
      background: radial-gradient(circle at center, rgba(54, 208, 255, 0.24), transparent 70%), rgba(15, 33, 50, 0.99);
    }

    .quick-actions {
      position: fixed;
      right: max(16px, calc((100vw - 1080px) / 2 + 16px));
      bottom: calc(var(--nav-height) + 22px);
      z-index: 12;
    }

    .quick-fab {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      border: 1px solid rgba(54, 208, 255, 0.65);
      background: rgba(18, 33, 51, 0.95);
      box-shadow: 0 14px 30px rgba(0,0,0,0.34);
      position: relative;
      animation: fabPulse 2.8s ease-in-out infinite;
    }

    .quick-fab::before,
    .quick-fab::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 3px;
      border-radius: 999px;
      background: var(--line);
      transform: translate(-50%, -50%);
      transition: transform 0.2s ease;
    }

    .quick-fab::after { transform: translate(-50%, -50%) rotate(90deg); }
    .quick-actions.open .quick-fab::after { transform: translate(-50%, -50%) rotate(0deg); }

    .quick-menu {
      position: absolute;
      right: 0;
      bottom: 70px;
      width: 232px;
      padding: 14px;
      border-radius: 20px;
      background: linear-gradient(180deg, var(--panel-2), rgba(10, 18, 28, 0.98));
      border: 1px solid rgba(54, 208, 255, 0.42);
      box-shadow: var(--shadow);
      display: none;
      gap: 10px;
    }

    .quick-actions.open .quick-menu { display: grid; }
    .empty-box,
    .empty-text { color: var(--muted); font-size: 12px; line-height: 1.6; }
    .inline-error { color: var(--danger); font-size: 12px; }
    .inline-note { color: var(--muted); font-size: 12px; line-height: 1.6; }
    .inline-feedback {
      font-size: 12px;
      line-height: 1.6;
      color: var(--line);
    }
    .inline-feedback.warn { color: var(--warn); }
    .inline-feedback.success { color: var(--line-soft); }
    .ocr-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: end center;
      padding: 18px;
      background: rgba(3, 7, 12, 0.72);
      backdrop-filter: blur(10px);
    }

    .modal-sheet {
      width: min(520px, 100%);
      max-height: 88vh;
      overflow: auto;
      border-radius: 26px;
      padding-top: 22px;
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 3;
      width: 42px;
      height: 42px;
      min-height: 42px;
      font-size: 20px;
      font-weight: 600;
      line-height: 1;
      padding: 0;
      padding-bottom: 1px;
      letter-spacing: 0;
      transform-origin: center;
      border-radius: 14px;
      border-color: rgba(54, 208, 255, 0.42);
      background: rgba(16, 35, 54, 0.92);
      color: var(--text);
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.22);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .close-btn:hover {
      transform: rotate(90deg) scale(1.04);
      border-color: rgba(54, 208, 255, 0.75);
      background: rgba(19, 42, 64, 0.98);
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.28), 0 0 0 1px rgba(54, 208, 255, 0.16);
    }

    .modal-head {
      padding-right: 56px;
      margin-bottom: 10px;
    }

    .confirm-copy strong { color: var(--text); }
    .hidden { display: none !important; }

    .toast {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      min-width: 220px;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(16, 25, 39, 0.96);
      border: 1px solid rgba(54, 208, 255, 0.55);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .toast.warn { border-color: rgba(255, 155, 61, 0.6); }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 16;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
      min-height: var(--nav-height);
      background: rgba(8, 14, 23, 0.92);
      border-top: 1px solid rgba(78, 116, 151, 0.45);
      backdrop-filter: blur(18px);
    }

    .bottom-nav a {
      min-height: 50px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      border: 1px solid rgba(78, 116, 151, 0.35);
      color: var(--muted);
      font-size: 12px;
      background: rgba(17, 26, 39, 0.84);
    }

    .bottom-nav a.active {
      color: var(--text);
      border-color: rgba(54, 208, 255, 0.55);
      background: rgba(22, 39, 58, 0.95);
    }

    @media (max-width: 720px) {
      #app { padding: 16px 12px calc(var(--nav-height) + 28px); }
      .metric-grid,
      .dual-list,
      .quick-menu { grid-template-columns: 1fr 1fr; }
      .quick-actions { right: 14px; }
      .record-stack { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 560px) {
      html { font-size: 15px; }
      .dual-list,
      .record-grid,
      .quick-menu { grid-template-columns: 1fr; }
      .record-stack { grid-template-columns: 1fr; }
      .action-grid { grid-template-columns: 1fr; }
      .date-input { grid-template-columns: 1fr; }
      .ocr-actions { grid-template-columns: 1fr; }
      .date-input input {
        border-right: 0;
        border-bottom: 1px solid rgba(54, 208, 255, 0.18);
      }
      .toolbar-row,
      .record-head,
      .profile-row,
      .modal-head,
      .modal-actions,
      .auth-actions { flex-direction: column; align-items: stretch; }
      .quick-menu { width: 220px; }
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <nav id="nav" class="bottom-nav hidden"></nav>
  <div id="toast" class="toast hidden"></div>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
