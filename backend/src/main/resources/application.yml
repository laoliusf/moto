server:
  port: 18080
spring:
  application:
    name: moto-app
  datasource:
    url: jdbc:sqlite:moto.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      encoding: UTF-8
  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    secret: ThisIsASuperStrongJwtSecretKey_ChangeMe_1234567890
    expiration-days: 30
  cors:
    allowed-origins: http://localhost:12813,http://127.0.0.1:8123,http://localhost:8123,https://moto.iyyu.fun,https://moto.iyyu.fun:16888
  ocr:
    base-url: ${APP_OCR_BASE_URL:http://127.0.0.1:1224}
